<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>small_guys_prox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0; padding: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      font-family: system-ui, sans-serif;
    }
    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 25px;
      max-width: 900px;
      margin: 40px auto;
    }
    button {
      padding: 12px 20px;
      margin: 6px;
      border: none;
      border-radius: 10px;
      background: #7b00ff;
      color: white;
      cursor: pointer;
    }
    button:hover { background: #9d4aff; }
    input { padding: 12px; width: 70%; border-radius: 8px; }
  </style>

  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <script src="/baremux/index.js"></script>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="glass">
    <h1>small_guys_prox</h1>
    <input type="password" id="sitePassInput" placeholder="Enter Site Password">
    <button onclick="checkSitePassword()">Enter</button>
  </div>

  <!-- Main App -->
  <div id="mainApp" style="display:none;" class="glass">
    <button onclick="toggleTheme()">🌗 Light / Dark</button>
    <button onclick="openDevTools()">🔧 Dev Tools</button>
    <button onclick="cloakTab('Google')">Tab Cloak → Google</button>
    <button onclick="cloakTab('')">Tab Cloak → about:blank</button>

    <input id="cloakUrlInput" placeholder="Custom URL Cloak (about:blank)" style="width:50%;">
    <button onclick="applyUrlCloak()">Apply Cloak</button>

    <br><br>
    <input id="proxyInput" placeholder="Enter URL here" style="width:70%; padding:12px;">
    <button onclick="startProxy()">Go</button>

    <iframe id="proxyFrame" style="width:100%; height:80vh; border:none; margin-top:20px;"></iframe>
  </div>

  <script>
    let sitePassword = "May_the_purv_be_with_you";
    let devPassword = "Hi@12345";

    function checkSitePassword() {
      if (document.getElementById("sitePassInput").value === sitePassword) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        registerSW();
      } else {
        alert("Wrong Password!");
      }
    }

    async function registerSW() {
      if ("serviceWorker" in navigator) {
        await navigator.serviceWorker.register("/uv/sw.js");
      }
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme");
      document.documentElement.setAttribute("data-theme", current === "dark" ? "light" : "dark");
    }

    function cloakTab(title) {
      document.title = title || "";
    }

    function applyUrlCloak() {
      const url = document.getElementById("cloakUrlInput").value || "about:blank";
      history.pushState({}, "", url);
    }

    function openDevTools() {
      const pass = prompt("Enter Dev Tools Password:");
      if (pass !== devPassword) return alert("Wrong Dev Password!");

      const newSite = prompt("New Site Password:", sitePassword);
      if (newSite) sitePassword = newSite;

      const newDev = prompt("New Dev Tools Password:", devPassword);
      if (newDev) devPassword = newDev;

      alert("✅ Dev Tools Opened! Passwords updated.");
    }

    async function startProxy() {
      let url = document.getElementById("proxyInput").value.trim();
      if (!url) return alert("Enter a URL!");
      if (!url.startsWith("http")) url = "https://" + url;

      document.getElementById("proxyFrame").src = __uv$config.prefix + __uv$config.encodeUrl(url);
    }
  </script>
</body>
</html>

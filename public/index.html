<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>small_guys_prox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0; padding: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      font-family: system-ui, sans-serif;
    }
    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 30px;
      max-width: 1000px;
      margin: 40px auto;
    }
    button {
      padding: 14px 24px;
      margin: 8px;
      border: none;
      border-radius: 12px;
      background: #7b00ff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #9d4aff; transform: scale(1.05); }
    input { padding: 14px; width: 75%; border-radius: 10px; border: none; margin: 10px 0; }
  </style>
</head>
<body>
  <div id="loginScreen" class="glass">
    <h1>small_guys_prox</h1>
    <p>Advanced Proxy</p>
    <input type="password" id="sitePassInput" placeholder="Site Password">
    <button onclick="checkSitePassword()">Enter</button>
  </div>

  <div id="mainApp" style="display:none;" class="glass">
    <button onclick="toggleTheme()">🌗 Light / Dark</button>
    <button onclick="openDevTools()">🔧 Dev Tools</button>
    <button onclick="cloakTab('Google')">Tab Cloak → Google</button>
    <button onclick="cloakTab('')">Tab Cloak → about:blank</button>

    <input id="cloakUrlInput" placeholder="URL Cloak (about:blank)" style="width:60%;">
    <button onclick="applyUrlCloak()">Apply Cloak</button>

    <br><br>
    <input id="proxyInput" placeholder="Enter URL (crazygames.com)" style="width:70%;">
    <button onclick="startProxy()">Go</button>

    <iframe id="proxyFrame" style="width:100%; height:80vh; border:none; margin-top:20px;"></iframe>
  </div>

  <script>
    let sitePassword = "May_the_purv_be_with_you";
    let devPassword = "Hi@12345";

    function checkSitePassword() {
      if (document.getElementById("sitePassInput").value === sitePassword) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
      } else alert("Wrong Password!");
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme");
      document.documentElement.setAttribute("data-theme", current === "dark" ? "light" : "dark");
    }

    function cloakTab(title) {
      document.title = title || "";
    }

    function applyUrlCloak() {
      const url = document.getElementById("cloakUrlInput").value.trim() || "about:blank";
      history.pushState({}, "", url);
    }

    function openDevTools() {
      const pass = prompt("Enter Dev Tools Password:");
      if (pass !== devPassword) return alert("Wrong Dev Password!");

      const newSite = prompt("New Site Password:", sitePassword);
      if (newSite) sitePassword = newSite;

      const newDev = prompt("New Dev Tools Password:", devPassword);
      if (newDev) devPassword = newDev;

      alert("Dev Tools Opened!");
    }

    function startProxy() {
      let url = document.getElementById("proxyInput").value.trim();
      if (!url) return alert("Enter a URL!");
      if (!url.startsWith("http")) url = "https://" + url;
      document.getElementById("proxyFrame").src = url;
    }
  </script>
</body>
</html>

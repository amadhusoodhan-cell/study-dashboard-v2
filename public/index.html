<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>small_guys_prox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root[data-theme="light"] {
      --bg: #f0f0f0;
      --text: #000;
    }
    :root[data-theme="dark"] {
      --bg: #0a0a1f;
      --text: #fff;
    }
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }
    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    button {
      padding: 12px 20px;
      margin: 6px;
      border: none;
      border-radius: 10px;
      background: #7b00ff;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #9d4aff;
      transform: scale(1.05);
    }
    input {
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      width: 80%;
    }
  </style>

  <!-- Ultraviolet Core Files (Advanced Rewriting + Service Worker) -->
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <script src="/baremux/index.js"></script>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="glass" style="max-width:420px; margin:120px auto; text-align:center;">
    <h1>small_guys_prox</h1>
    <p>Advanced Ultraviolet Proxy</p>
    <input type="password" id="sitePassInput" placeholder="Enter Site Password" style="width:85%; padding:12px;">
    <br>
    <button onclick="checkSitePassword()" style="width:85%; padding:14px;">Enter Proxy</button>
  </div>

  <!-- Main Application -->
  <div id="mainApp" style="display:none; padding:20px;">
    <div style="text-align:center; margin-bottom:15px;">
      <button onclick="toggleTheme()">🌗 Light / Dark Mode</button>
      <button onclick="openDevTools()">🔧 Dev Tools</button>
      <button onclick="cloakTab('Google')">Tab Cloak → Google</button>
      <button onclick="cloakTab('')">Tab Cloak → about:blank</button>
    </div>

    <input id="cloakUrlInput" placeholder="Custom URL Cloak (e.g. about:blank)" style="width:60%; padding:10px;">
    <button onclick="applyUrlCloak()">Apply URL Cloak</button>

    <br><br>
    <input id="proxyInput" placeholder="Enter URL here (example.com)" style="width:75%; padding:14px; font-size:16px;">
    <button onclick="startProxy()" style="font-size:16px; padding:14px 30px;">Go →</button>

    <iframe id="proxyFrame" style="width:100%; height:82vh; border:none; margin-top:20px; background:#000;"></iframe>
  </div>

  <script>
    let sitePassword = "May_the_purv_be_with_you";
    let devPassword = "Hi@12345";

    function checkSitePassword() {
      if (document.getElementById("sitePassInput").value === sitePassword) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        registerSW();
      } else {
        alert("Incorrect Password!");
      }
    }

    async function registerSW() {
      if ("serviceWorker" in navigator) {
        try {
          await navigator.serviceWorker.register("/uv/sw.js");
          console.log("✅ Advanced Service Worker Loaded");
        } catch (e) {
          console.error("Service Worker Error", e);
        }
      }
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme");
      document.documentElement.setAttribute("data-theme", current === "dark" ? "light" : "dark");
    }

    function cloakTab(title) {
      document.title = title || "";
    }

    function applyUrlCloak() {
      const url = document.getElementById("cloakUrlInput").value.trim() || "about:blank";
      history.pushState({}, "", url);
    }

    function openDevTools() {
      const pass = prompt("Enter Dev Tools Password:");
      if (pass !== devPassword) {
        alert("Wrong Dev Password!");
        return;
      }

      const newSite = prompt("New Site Password:", sitePassword);
      if (newSite) sitePassword = newSite;

      const newDev = prompt("New Dev Tools Password:", devPassword);
      if (newDev) devPassword = newDev;

      alert("✅ Dev Tools Unlocked!\nPasswords updated successfully.");
    }

    async function startProxy() {
      let url = document.getElementById("proxyInput").value.trim();
      if (!url) {
        alert("Please enter a URL");
        return;
      }
      if (!url.startsWith("http")) url = "https://" + url;

      // Try to use Epoxy encrypted routing
      try {
        const wispUrl = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/";
        const conn = new BareMux.BareMuxConnection("/baremux/worker.js");
        await conn.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);
      } catch(e) {}

      document.getElementById("proxyFrame").src = __uv$config.prefix + __uv$config.encodeUrl(url);
    }
  </script>
</body>
</html>
